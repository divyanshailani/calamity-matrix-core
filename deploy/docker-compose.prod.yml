# ─────────────────────────────────────────────────────────────
#  Calamity Matrix — Production Docker Compose
#  Stack: FastAPI API + Nginx Reverse Proxy
#  Database: Supabase (external, via DATABASE_URL)
# ─────────────────────────────────────────────────────────────

services:
  # ── FastAPI Backend ───────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: calamity_api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    volumes:
      - ../models:/app/models:ro
      - ../data:/app/data:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 40s
      retries: 3
    networks:
      - calamity_net

  # ── Nginx Reverse Proxy ───────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: calamity_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/calamityai.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    depends_on:
      - api
    networks:
      - calamity_net

networks:
  calamity_net:
    driver: bridge
