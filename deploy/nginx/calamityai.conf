# ─────────────────────────────────────────────────────────────
#  Calamity Matrix — Nginx Configuration
#  Domain: calamityai.tech
#  Proxies: localhost:8000 (FastAPI)
# ─────────────────────────────────────────────────────────────

upstream fastapi_backend {
    server api:8000 max_fails=3 fail_timeout=30s;
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name api.calamityai.tech www.api.calamityai.tech;

    # Certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Everything else → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS — Main server block
server {
    listen 443 ssl;
    server_name api.calamityai.tech www.api.calamityai.tech;

    # SSL Certificates (managed by Certbot)
    ssl_certificate     /etc/letsencrypt/live/api.calamityai.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.calamityai.tech/privkey.pem;

    # SSL hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Use Docker's internal DNS resolver
    resolver 127.0.0.11 valid=30s;

    # Proxy to FastAPI
    location / {
        proxy_pass         http://fastapi_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
    }

    # Health check endpoint (no auth)
    location /health {
        proxy_pass http://fastapi_backend/health;
        access_log off;
    }
}
