name: Autonomous Tri-API Ingestion

on:
  schedule:
    - cron: '30 5 * * 0' # Run weekly on Sundays at 05:30 UTC
  workflow_dispatch: # Allow manual triggering

jobs:
  ingest:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Trigger Autonomous Crawler Proxy
      env:
        INGESTION_SECRET_KEY: ${{ secrets.INGESTION_SECRET_KEY }}
      run: |
        curl -k -X POST https://143.244.134.76/api/v1/trigger_ingestion \
             -H "X-Ingestion-Secret: $INGESTION_SECRET_KEY" \
             -w "\nHTTP Status: %{http_code}\n"
